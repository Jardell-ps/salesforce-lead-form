<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Teste de Integração Salesforce</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-xl w-96">
        <h2 class="text-xl font-bold mb-4 text-gray-800">Registro de Lead Tech</h2>
        
        <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8" method="POST">
            
            <!-- SUBSTITUA O VALOR ABAIXO PELO SEU OID -->
            <input type="hidden" name="oid" value="00Dg50000095VM9">
            <!-- O Salesforce lê este 'value' para saber para onde pular após o envio -->
<input type="hidden" name="retURL" value="https://jardell-ps.github.io/salesforce-lead-form/obrigado.html">
            <div class="space-y-4">       
                <input name="first_name" placeholder="Nome" type="text" required class="w-full border p-2 rounded">
                <input name="last_name" placeholder="Sobrenome" type="text" required class="w-full border p-2 rounded">
                <input name="email" placeholder="E-mail" type="email" required class="w-full border p-2 rounded">
                <input name="phone" placeholder="Telefone (11 dígitos)" type="text" class="w-full border p-2 rounded">
                
                <select name="industry" class="w-full border p-2 rounded">
                    <option value="">Selecione o Setor</option>
                    <option value="Technology">Technology</option>
                    <option value="Parceira">Parceira</option>
                    <option value="Lojista - Revenda ">Lojista</option>
                    <option value="Blogueira">Blogueira</option>
                </select>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">
                    Enviar para Salesforcee
                </button>
            </div>
        </form>
    </div>

</body>
</html>
